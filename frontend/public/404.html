<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hostel 15</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the window to load the correct path without a page refresh.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    <script type="text/javascript">
      // If the page was reached via a 404, redirect to index.html with the path in query param
      var path = window.location.pathname;
      var base = '/hotel-15/';
      if (path.startsWith(base)) {
        var p = path.slice(base.length);
        window.location.replace(base + 'index.html?p=' + p.replace(/&/g, '~and~'));
      } else {
        window.location.replace(base);
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
